<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地文本阅读器 - StudyHelper</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://jsdelivr.net"></script>
    <!-- FontAwesome 图标 -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        /* 隐藏滚动条但保持可滚动 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col transition-colors duration-300 dark:bg-slate-900 dark:text-slate-100">

    <!-- 顶部导航栏 -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 dark:bg-slate-800 dark:border-slate-700 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <a href="index.html" class="text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-200">
                    <i class="fa-solid fa-arrow-left text-lg"></i>
                </a>
                <i class="fa-solid fa-book-open text-indigo-600 text-2xl dark:text-indigo-400"></i>
                <h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">本地文本阅读器</h1>
            </div>
            
            <div class="flex items-center space-x-3">
                <!-- 暗黑模式切换 -->
                <button id="themeToggleBtn" class="p-2 rounded-lg text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-700 transition-colors" title="切换主题">
                    <i id="themeIcon" class="fa-solid fa-moon text-lg"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- 主体内容区域 -->
    <main class="flex-1 max-w-5xl w-full mx-auto p-4 md:p-6 flex flex-col lg:flex-row gap-6">
        
        <!-- 左侧/顶部 控制面板面板 -->
        <aside class="w-full lg:w-64 shrink-0 flex flex-col gap-4">
            <!-- 文件上传卡片 -->
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm dark:bg-slate-800 dark:border-slate-700">
                <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">打开本地文件</h2>
                <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-300 rounded-xl cursor-pointer bg-slate-50 hover:bg-indigo-50/50 hover:border-indigo-400 transition-all dark:bg-slate-900/50 dark:border-slate-600 dark:hover:bg-indigo-950/30 dark:hover:border-indigo-500 group">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-2">
                        <i class="fa-solid fa-cloud-arrow-up text-2xl text-slate-400 group-hover:text-indigo-500 mb-2 transition-colors"></i>
                        <p class="text-xs text-slate-600 dark:text-slate-400 font-medium">点击选择本地文本</p>
                        <p class="text-[10px] text-slate-400 mt-1">支持 .txt / .md 文件</p>
                    </div>
                    <input id="fileInput" type="file" accept=".txt,.md" class="hidden" />
                </label>
                <!-- 当前文件名展示 -->
                <div id="fileInfoArea" class="mt-3 hidden">
                    <p class="text-xs text-slate-400 mb-1">当前阅读：</p>
                    <div class="flex items-center space-x-2 bg-slate-100 dark:bg-slate-900 p-2 rounded-lg border border-slate-200 dark:border-slate-700">
                        <i class="fa-regular fa-file-lines text-indigo-500 shrink-0"></i>
                        <span id="fileNameDisplay" class="text-xs font-medium truncate text-slate-700 dark:text-slate-300">未选择文件</span>
                    </div>
                </div>
            </div>

            <!-- 阅读排版调节卡片 -->
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm dark:bg-slate-800 dark:border-slate-700 flex flex-col gap-4">
                <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">排版设置</h2>
                
                <!-- 字体大小调节 -->
                <div>
                    <label class="text-xs font-medium text-slate-500 dark:text-slate-400 flex justify-between mb-1.5">
                        <span>字体大小</span>
                        <span id="fontSizeVal" class="text-indigo-600 dark:text-indigo-400 font-bold">16px</span>
                    </label>
                    <div class="flex items-center space-x-2">
                        <button id="decFontSize" class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 flex items-center justify-center text-xs font-bold transition-colors">-</button>
                        <input id="fontSizeRange" type="range" min="12" max="32" step="1" value="16" class="w-full accent-indigo-600 dark:accent-indigo-400 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer">
                        <button id="incFontSize" class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 flex items-center justify-center text-xs font-bold transition-colors">+</button>
                    </div>
                </div>

                <!-- 行间距调节 -->
                <div>
                    <label class="text-xs font-medium text-slate-500 dark:text-slate-400 flex justify-between mb-1.5">
                        <span>行高间距</span>
                        <span id="lineHeightVal" class="text-indigo-600 dark:text-indigo-400 font-bold">1.6</span>
                    </label>
                    <div class="flex items-center space-x-2">
                        <button id="decLineHeight" class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 flex items-center justify-center text-xs font-bold transition-colors">-</button>
                        <input id="lineHeightRange" type="range" min="1.2" max="2.4" step="0.1" value="1.6" class="w-full accent-indigo-600 dark:accent-indigo-400 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer">
                        <button id="incLineHeight" class="w-8 h-8 rounded-lg bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 flex items-center justify-center text-xs font-bold transition-colors">+</button>
                    </div>
                </div>

                <!-- 阅读模式（专属底色） -->
                <div>
                    <label class="text-xs font-medium text-slate-500 dark:text-slate-400 block mb-2">阅读底色</label>
                    <div class="grid grid-cols-4 gap-2" id="bgStyleContainer">
                        <button data-bg="default" class="h-8 rounded-lg border-2 border-indigo-600 bg-white dark:bg-slate-800 transition-all flex items-center justify-center" title="默认明暗"></button>
                        <button data-bg="sepia" class="h-8 rounded-lg border border-amber-200 bg-[#f4ecd8] dark:bg-[#2b261d] dark:border-amber-900/40 transition-all" title="护眼纸张"></button>
                        <button data-bg="green" class="h-8 rounded-lg border border-green-200 bg-[#eef7ee] dark:bg-[#192419] dark:border-green-900/40 transition-all" title="清新护眼"></button>
                        <button data-bg="dark-pure" class="h-8 rounded-lg border border-slate-300 bg-slate-950 text-white dark:border-slate-800 transition-all" title="极夜纯黑"></button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 右侧 文本渲染画布区 -->
        <section class="flex-1 flex flex-col bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden dark:bg-slate-800 dark:border-slate-700 transition-colors duration-300" id="readerCanvas">
            <!-- 阅读器顶栏（统计信息） -->
            <div class="px-5 py-3 border-b border-slate-100 dark:border-slate-700 flex flex-wrap gap-4 items-center justify-between bg-slate-50/50 dark:bg-slate-900/20 text-xs text-slate-400 font-medium">
                <div class="flex items-center space-x-4">
                    <span>字数统计: <b id="textWordCount" class="text-slate-600 dark:text-slate-300 font-bold">0</b> 字</span>
                </div>
                <div class="flex items-center space-x-2">
                    <button id="clearContentBtn" class="text-red-500 hover:text-red-600 dark:text-red-400 dark:hover:text-red-300 font-medium flex items-center gap-1 transition-colors hidden">
                        <i class="fa-regular fa-trash-can"></i> 清空文本
                    </button>
                </div>
            </div>

            <!-- 核心文本显示区 -->
            <div class="flex-1 p-6 md:p-8 overflow-y-auto max-h-[calc(100vh-14rem)] no-scrollbar leading-relaxed text-justify select-text" id="textContentArea">
                <!-- 缺省空白占位提示 -->
                <div id="emptyState" class="h-full flex flex-col items-center justify-center text-center py-20">
                    <div class="w-16 h-16 bg-indigo-50 text-indigo-500 rounded-full flex items-center justify-center text-2xl mb-4 dark:bg-slate-700 dark:text-indigo-400">
                        <i class="fa-solid fa-file-import"></i>
                    </div>
                    <h3 class="text-base font-semibold text-slate-800 dark:text-white mb-1">暂无正在阅读的文本</h3>
                    <p class="text-sm text-slate-400 max-w-xs">请点击左侧面板上传本地的 .txt 或 .md 学习资料、小说、或者笔记进行沉浸式阅读。</p>
                </div>
                
                <!-- 真实内容注入容器 -->
                <article id="renderedText" class="whitespace-pre-wrap break-words hidden"></article>
            </div>
        </section>
    </main>

    <!-- 底部状态声明 -->
