<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyHelper - 单词本</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://jsdelivr.net"></script>
    <!-- FontAwesome 字体图标 -->
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        /* 隐藏滚动条但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-300">

    <!-- 顶部导航栏 -->
    <header class="sticky top-0 z-40 w-full border-b border-slate-200 bg-white/80 backdrop-blur dark:border-slate-800 dark:bg-slate-950/80">
        <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-graduation-cap text-2xl text-indigo-600 dark:text-indigo-400"></i>
                <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-indigo-600 to-violet-600 bg-clip-text text-transparent dark:from-indigo-400 dark:to-violet-400">StudyHelper</span>
            </div>
            <nav class="hidden md:flex space-x-1 text-sm font-medium">
                <a href="index.html" class="rounded-lg px-3 py-2 text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">首页</a>
                <a href="notes.html" class="rounded-lg px-3 py-2 text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">笔记</a>
                <a href="practice.html" class="rounded-lg px-3 py-2 text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">刷题</a>
                <a href="tomato.html" class="rounded-lg px-3 py-2 text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">番茄钟</a>
                <a href="wordbook.html" class="rounded-lg px-3 py-2 bg-indigo-50 text-indigo-600 dark:bg-indigo-950 dark:text-indigo-400">单词本</a>
                <a href="reader.html" class="rounded-lg px-3 py-2 text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">阅读</a>
                <a href="toolbox.html" class="rounded-lg px-3 py-2 text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">工具箱</a>
                <a href="settings.html" class="rounded-lg px-3 py-2 text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-800">设置</a>
            </nav>
            <div class="flex items-center gap-2">
                <button id="themeToggle" class="rounded-lg p-2 text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800" title="切换主题">
                    <i class="fa-solid fa-moon dark:hidden"></i>
                    <i class="fa-solid fa-sun hidden dark:block"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- 主体内容 -->
    <main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <!-- 头部数据及操作区 -->
        <div class="mb-8 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">单词背诵工具</h1>
                <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">科学标记生词，轻松隐藏释义进行自测。</p>
            </div>
            <div class="flex flex-wrap gap-3">
                <button onclick="openModal('add')" class="inline-flex items-center gap-2 rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus:outline-none transition-colors duration-200 cursor-pointer">
                    <i class="fa-solid fa-plus"></i> 添加单词
                </button>
                <button onclick="startQuizMode()" class="inline-flex items-center gap-2 rounded-xl bg-violet-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-violet-500 focus:outline-none transition-colors duration-200 cursor-pointer">
                    <i class="fa-solid fa-graduation-cap"></i> 随机抽查自测
                </button>
            </div>
        </div>

        <!-- 统计面板 -->
        <div class="grid grid-cols-2 gap-4 sm:grid-cols-4 mb-8">
            <div class="rounded-2xl border border-slate-200 bg-white p-5 dark:border-slate-800 dark:bg-slate-950 shadow-xs">
                <div class="text-sm font-medium text-slate-500 dark:text-slate-400">总单词数</div>
                <div id="totalCount" class="mt-2 text-3xl font-semibold tracking-tight text-slate-900 dark:text-white">0</div>
            </div>
            <div class="rounded-2xl border border-slate-200 bg-white p-5 dark:border-slate-800 dark:bg-slate-950 shadow-xs">
                <div class="text-sm font-medium text-amber-600 dark:text-amber-400">需复习生词</div>
                <div id="unfamiliarCount" class="mt-2 text-3xl font-semibold tracking-tight text-amber-600 dark:text-amber-400">0</div>
            </div>
            <div class="rounded-2xl border border-slate-200 bg-white p-5 dark:border-slate-800 dark:bg-slate-950 shadow-xs">
                <div class="text-sm font-medium text-emerald-600 dark:text-emerald-400">已掌握单词</div>
                <div id="masteredCount" class="mt-2 text-3xl font-semibold tracking-tight text-emerald-600 dark:text-emerald-400">0</div>
            </div>
            <div class="rounded-2xl border border-slate-200 bg-white p-5 dark:border-slate-800 dark:bg-slate-950 shadow-xs">
                <div class="text-sm font-medium text-slate-500 dark:text-slate-400">掌握进度</div>
                <div id="progressPercent" class="mt-2 text-3xl font-semibold tracking-tight text-indigo-600 dark:text-indigo-400">0%</div>
            </div>
        </div>

        <!-- 过滤及控制栏 -->
        <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
            <!-- 搜索框 -->
            <div class="relative flex-1 max-w-md">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </span>
                <input id="searchInput" type="text" placeholder="搜索单词、音标或中文释义..." oninput="renderWordList()"
                    class="w-full rounded-xl border border-slate-200 bg-white py-2.5 pl-10 pr-4 text-sm focus:border-indigo-500 focus:outline-none dark:border-slate-800 dark:bg-slate-950">
            </div>
            <!-- 分类过滤器 -->
            <div class="flex flex-wrap gap-2">
                <button onclick="filterWords('all')" id="filter-all" class="filter-btn px-4 py-2 text-sm font-medium rounded-xl bg-indigo-600 text-white shadow-xs">全部</button>
                <button onclick="filterWords('unfamiliar')" id="filter-unfamiliar" class="filter-btn px-4 py-2 text-sm font-medium rounded-xl bg-white text-slate-600 border border-slate-200 dark:bg-slate-950 dark:text-slate-300 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-900">生词本</button>
                <button onclick="filterWords('mastered')" id="filter-mastered" class="filter-btn px-4 py-2 text-sm font-medium rounded-xl bg-white text-slate-600 border border-slate-200 dark:bg-slate-950 dark:text-slate-300 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-900">已熟记</button>
                <button onclick="toggleAllDefinitions()" id="toggleDefBtn" class="px-4 py-2 text-sm font-medium rounded-xl bg-slate-200 text-slate-700 dark:bg-slate-800 dark:text-slate-300 hover:opacity-90">
                    <i class="fa-solid fa-eye-slash mr-1"></i> 批量隐藏释义
                </button>
            </div>
        </div>

        <!-- 单词列表渲染区域 -->
        <div id="wordGrid" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
            <!-- 动态生成单词卡片 -->
        </div>

        <!-- 缺省空白提示 -->
        <div id="emptyState" class="hidden flex-col items-center justify-center py-20 text-center">
            <div class="rounded-full bg-slate-100 p-4 dark:bg-slate-800">
                <i class="fa-solid fa-book-open text-4xl text-slate-400"></i>
            </div>
            <h3 class="mt-4 text-lg font-medium">暂无相符单词</h3>
            <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">开始录入你的第一个单词或者调整过滤条件吧！</p>
        </div>
    </main>

    <!-- 弹窗 1：新增/编辑单词 Modal -->
    <div id="wordModal" class="fixed inset-0 z-50 hidden overflow-y-auto bg-slate-900/50 backdrop-blur-xs flex items-center justify-center p-4">
        <div class="w-full max-w-md transform overflow-hidden rounded-2xl bg-white p-6 shadow-xl transition-all dark:bg-slate-950 border border-slate-200 dark:border-slate-800">
            <div class="flex items-center justify-between border-b border-slate-200 pb-3 dark:border-slate-800">
                <h3 id="modalTitle" class="text-lg font-semibold text-slate-900 dark:text-white">录入新单词</h3>
                <button onclick="closeModal('word')" class="rounded-lg p-1 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-900"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="wordForm" onsubmit="saveWordForm(event)" class="mt-4 space-y-4">
                <input type="hidden" id="wordId">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">英文单词 *</label>
                    <input type="text" id="inputWord" required autocomplete="off" placeholder="例如：meticulous"
                        class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none dark:border-slate-800 dark:bg-slate-900">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">音标 (选填)</label>
